{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="card-header bg-primary text-white text-center p-4 border-0">
                <h3 class="fw-bold mb-0">Welcome Back</h3>
                <p class="text-white-50 mb-0">Login to your account</p>
            </div>
            <div class="card-body p-5">
                <form action="{{ url_for('login') }}" method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Username</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-light border-0"><i class="bi bi-person text-secondary"></i></span>
                            <input type="text" name="username" class="form-control bg-light border-0" required placeholder="Enter username">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Password</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-light border-0"><i class="bi bi-lock text-secondary"></i></span>
                            <input type="password" name="password" class="form-control bg-light border-0" required placeholder="Enter password">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill fw-bold shadow-sm mb-3">Login</button>
                    <div class="text-center text-muted">
                        Don't have an account? <a href="{{ url_for('register') }}" class="text-decoration-none fw-semibold">Sign up here</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
