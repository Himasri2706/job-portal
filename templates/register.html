{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center mb-5" style="min-height: 70vh;">
    <div class="col-md-8 col-lg-6">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="card-header bg-primary text-white text-center p-4 border-0">
                <h3 class="fw-bold mb-0">Create an Account</h3>
                <p class="text-white-50 mb-0">Join our job portal today</p>
            </div>
            <div class="card-body p-5">
                <form action="{{ url_for('register') }}" method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-semibold text-secondary">Username</label>
                            <input type="text" name="username" class="form-control form-control-lg bg-light border-0" required placeholder="johndoe">
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label fw-semibold text-secondary">Email</label>
                            <input type="email" name="email" class="form-control form-control-lg bg-light border-0" required placeholder="john@example.com">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Password</label>
                        <input type="password" name="password" class="form-control form-control-lg bg-light border-0" required placeholder="Create a strong password">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary d-block">I am a...</label>
                        <div class="d-flex gap-3 mt-2">
                            <input type="radio" class="btn-check" name="role" id="role-seeker" value="seeker" autocomplete="off" checked>
                            <label class="btn btn-outline-primary rounded-3 flex-fill py-3 fw-semibold transition-hover" for="role-seeker">
                                <i class="bi bi-person-badge fs-3 d-block mb-2"></i>Job Seeker
                            </label>

                            <input type="radio" class="btn-check" name="role" id="role-employer" value="employer" autocomplete="off">
                            <label class="btn btn-outline-primary rounded-3 flex-fill py-3 fw-semibold transition-hover" for="role-employer">
                                <i class="bi bi-building fs-3 d-block mb-2"></i>Employer
                            </label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill fw-bold shadow-sm mb-3">Register</button>
                    <div class="text-center text-muted">
                        Already have an account? <a href="{{ url_for('login') }}" class="text-decoration-none fw-semibold">Login here</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
